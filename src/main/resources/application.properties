spring.application.name=RestAPI

# Port - Path Configuration ==================================================
server.port=8000
#server.servlet.context-path=/identity

# Database Configuration =====================================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=RestAPI;encrypt=true;trustServerCertificate=true
spring.datasource.username=sa
spring.datasource.password=sa
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# JPA Configuration ===========================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger Configuration ========================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Authentication Configuration =================================================
jwt.secret=test-secret-key-32-bytes-minimum

app.admin.password=Admin@123