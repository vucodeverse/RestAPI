spring:
  application:
    name: RestAPI
  profiles:
    active: dev
  data:
    redis:
      host: localhost
      port: 6379
      # R3 Fix: Lettuce connection pool for Redis resilience
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 2
          max-wait: 2000ms
    web:
      pageable:
        serialization-mode: via_dto
  datasource:
    # R3 Fix: HikariCP connection pool tuning
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: RestAPI-HikariPool

server:
  port: 8000

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

jwt:
  valid-duration: 3600
  refreshable-duration: 2592000

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
