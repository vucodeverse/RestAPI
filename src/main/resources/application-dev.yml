spring:
  boot:
    admin:
      client:
        url: http://localhost:8081
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=RestAPI;encrypt=true;trustServerCertificate=true
    username: sa
    password: sa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: ${JWT_SECRET:dev-only-fallback-secret-key-never-use-in-production-must-be-32chars-min}

google:
  client-id: ${GOOGLE_CLIENT_ID:your-placeholder-client-id.apps.googleusercontent.com}

app:
  admin:
    # C6 Fix: Use env variable — set ADMIN_PASSWORD in .env for docker, or env var locally
    password: ${ADMIN_PASSWORD:Admin@123}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081,http://localhost:8080}


logging:
  level:
    com.phongvu.restapi: debug

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: RestAPI
