spring:
  boot:
    admin:
      client:
        url: http://localhost:8081
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=RestAPI;encrypt=true;trustServerCertificate=true
    username: sa
    password: sa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

jwt:
  secret: test-secret-key-32-bytes-minimum

app:
  admin:
    password: Admin@123
  cors:
    allowed-origins: "*"

logging:
  level:
    com.phongvu.restapi: debug

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: RestAPI
