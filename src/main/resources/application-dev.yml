spring:
  boot:
    admin:
      client:
        url: http://localhost:8081
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=RestAPI;encrypt=true;trustServerCertificate=true
    username: sa
    password: sa
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

jwt:
  secret: ${JWT_SECRET:your-fallback-very-long-secret-key-for-dev-12345678901234567890}

app:
  admin:
    password: Admin@123
  cors:
    allowed-origins: "http://localhost:3000, http://localhost:8081, http://localhost:8080"

logging:
  level:
    com.phongvu.restapi: debug

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: RestAPI
